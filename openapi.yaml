openapi: 3.0.3
info:
  title: API de Blog
  description: API REST de autores y publicaciones (estilo JSONPlaceholder)
  version: "1.0.0"
servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://blog-api-production-dffb.up.railway.app
    description: Servidor en Railway

paths:
  /authors:
    get:
      summary: Listar todos los autores
      responses:
        "200":
          description: Lista de autores
    post:
      summary: Crear un autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        "201":
          description: Autor creado
        "400":
          description: Datos inválidos

  /authors/{id}:
    get:
      summary: Obtener un autor por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado
        "404":
          description: Autor no encontrado
    put:
      summary: Actualizar un autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor actualizado
        "404":
          description: Autor no encontrado
    delete:
      summary: Eliminar un autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminado correctamente
        "404":
          description: Autor no encontrado

  /posts:
    get:
      summary: Listar todos los posts
      responses:
        "200":
          description: Lista de posts
    post:
      summary: Crear un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, author_id]
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
      responses:
        "201":
          description: Post creado
        "400":
          description: Datos inválidos

  /posts/{id}:
    get:
      summary: Obtener un post por id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
        "404":
          description: Post no encontrado
    put:
      summary: Actualizar un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post actualizado
        "404":
          description: Post no encontrado
    delete:
      summary: Eliminar un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminado correctamente
        "404":
          description: Post no encontrado

  /posts/author/{authorId}:
    get:
      summary: Listar posts de un autor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del autor